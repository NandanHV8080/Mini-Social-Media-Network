name: Nandan Comments View Storage Tests

on:
  push:
    branches:
      - main
      - feature/comments-view-storage
  pull_request:
    branches:
      - main

jobs:
  test-nandan-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Nandan unittest file
        run: python -m unittest tests/test_comments_view_storage.py
