name: Yujie Posts Like Tests

on:
  push:
    branches:
      - feature/posts-like
      - main
  pull_request:
    branches:
      - main

jobs:
  test-yujie-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Yujie unittest file
        run: python -m unittest tests/test_posts_like.py
